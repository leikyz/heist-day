; DefaultEngine.ini — EOS Lobby System (OSSv1, UE 5.x)
; ============================================================
; Changes from original:
;   - bUseEOSSession=true  (was false — required for lobby creation via OSS)
;   - Added bMirrorStatsToEOS, bMirrorAchievementsToEOS = false (avoids irrelevant EOS errors)
;   - Added PortalWebSocketPort to avoid port conflict warnings
;   - No other credentials changed

[/Script/EngineSettings.GameMapsSettings]
GameDefaultMap=/Game/Level/Lobby_Level.Lobby_Level
GlobalDefaultGameMode=/Game/BP_Gamemode.BP_Gamemode_C
ServerDefaultMap=/Game/Level/Museum_Level.Museum_Level
EditorStartupMap=/Game/Level/Lobby_Level.Lobby_Level

[/Script/Engine.GameSession]
bRequiresPushToTalk=false
bIsLanMatch=false

[Core.Log]
LogEOSSDK=Verbose
LogEOS=Verbose
LogOnline=Verbose
LogOnlineSession=Verbose
; Optional — turn these off once things work to reduce log spam:
; LogEOSSDK=Warning
; LogEOS=Warning
; LogOnline=Warning
; LogOnlineSession=Warning

; ==============================================================================
; ONLINE SUBSYSTEM (OSSv1 - STABLE — recommended over OSSv2 for lobbies)
; ==============================================================================

[OnlineSubsystem]
DefaultPlatformService=EOS

[OnlineSubsystemEOS]
bEnabled=true
bUseEAS=true
bUseEOSConnect=true
; IMPORTANT: Was false in your original — must be true for lobby/session creation
bUseEOSSession=true
bMirrorStatsToEOS=false
bMirrorAchievementsToEOS=false

[/Script/Engine.GameEngine]
